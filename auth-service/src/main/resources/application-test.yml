spring:
  # Cấu hình nạp đè để test độc lập
  application:
    name: auth-service-test

  # Giữ nguyên cấu hình Virtual Threads nếu bạn đang sử dụng ở main
  threads:
    virtual:
      enabled: true

  # Khi chạy test bằng Testcontainers, cổng của DB/Redis/Kafka sẽ thay đổi liên tục.
  # Do đó, các cấu hình URL kết nối thực tế bên dưới sẽ được class AbstractIntegrationTest 
  # tự động nạp đè (override) tại runtime thông qua @DynamicPropertySource.
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/authdb_test
    username: authuser
    password: authpass

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # GIẢI QUYẾT LỖI: Ép Hibernate tự động tạo/cập nhật bảng 'permission' 
      # và các bảng khác dựa trên Entity Java, không bắt buộc validate khắt khe từ Flyway nữa.
      ddl-auto: update
    show-sql: true # Bật lên để bạn dễ debug xem các câu lệnh SQL chạy thế nào khi test
    properties:
      hibernate:
        format_sql: true

  # Tạm thời tắt Flyway khi chạy test để Hibernate tự lo Schema (tránh xung đột ddl-auto)
  flyway:
    enabled: false

  # Cấu hình Kafka cho môi trường Test
  kafka:
    consumer:
      group-id: auth-service-test-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*" # Mở rộng quyền tin cậy package để tránh lỗi Deserialize khi test

  # Cấu hình gRPC Server chạy trên cổng ngẫu nhiên (In-Process) để không bị trùng port khi test nhiều class
  grpc:
    server:
      port: 0

# TẮT các dịch vụ bên thứ ba không cần thiết khi chạy Test để tăng tốc độ khởi động Context
eureka:
  client:
    enabled: false # Tắt Eureka Client, bài test không cần đăng ký lên Eureka Server

# Cấu hình bảo mật lỏng hơn một chút cho môi trường test (nếu cần)
auth:
  cookie:
    secure: false # Cho phép nhận cookie trên môi trường test HTTP thông thường

# Giữ nguyên secret phục vụ việc tạo và parse thử nghiệm JWT token trong bài test
jwt:
  secret: change-me-change-me-change-me-change-me-please-32chars
  access-expiration-seconds: 900
  refresh-expiration-days: 7
  issuer: test.hieu.com

# Bật log chi tiết cho riêng package hệ thống của bạn để dễ theo dõi tiến trình chạy test
logging:
  level:
    com.example.auth_service: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG